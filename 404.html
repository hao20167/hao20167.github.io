	<script>
	var txt="Hong có trang này trên sever, hix :<    ";
	var espera=160;
	var refresco=null;
	function rotulo_title() 
	{
		document.title=txt;

		refresco=setTimeout("rotulo_title()",espera);

	rotulo_title();
